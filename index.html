          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/>
          <path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/>

      ),
      Download: ({className=""}) => (
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" className={className}>
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <path d="m7 10 5 5 5-5"/><path d="M12 15V3"/>
        </svg>
      ),
      Printer: ({className=""}) => (
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" className={className}>
          <path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
          <path d="M6 14h12v8H6z"/>
        </svg>
      ),
      Search: ({className=""}) => (
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" className={className}>
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
      ),
      X: ({className=""}) => (
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" className={className}>
          <path d="M18 6 6 18"/><path d="m6 6 12 12"/>
        </svg>
      )
    };

    const AGE_ORDER = ["60-70","70-80","80+","Non renseigné"];
    const COLORS = {
      blue: "#0f6cbd",
      green: "#16a34a",
      orange: "#f59e0b",
      red: "#dc2626",
      slate: "#64748b",
      teal: "#0f766e",
      violet: "#7c3aed"
    };

    function cn(...arr) {
      return arr.filter(Boolean).join(" ");
    }

    function formatNumber(n, d=0) {
      if (n === null || n === undefined || Number.isNaN(n)) return "—";
      return Number(n).toLocaleString("fr-FR", { minimumFractionDigits: d, maximumFractionDigits: d });
    }

    function formatPct(n) {
      if (n === null || n === undefined || Number.isNaN(n)) return "—";
      return `${Number(n).toLocaleString("fr-FR", { minimumFractionDigits: 1, maximumFractionDigits: 1 })} %`;
    }

    function statusLabel(v) {
      if (v === true) return "Oui";
      if (v === false) return "Non";
      return "NR";
    }

    function groupCounts(rows, keyFn) {
      const m = new Map();
      rows.forEach(r => {
        const key = keyFn(r);
        m.set(key, (m.get(key) || 0) + 1);
      });
      return Array.from(m.entries()).map(([label, value]) => ({ label, value }));
    }

    function topCounts(rows, field, topN=8) {
      return groupCounts(rows, r => r[field] || "Non renseigné")
        .sort((a,b) => b.value - a.value)
        .slice(0, topN);
    }

    function prevalence(rows, field) {
      const valid = rows.filter(r => r[field] !== null);
      if (!valid.length) return 0;
      const yes = valid.filter(r => r[field] === true).length;
      return (yes / valid.length) * 100;
    }

    function SelectFilter({ label, value, onChange, options }) {
      return (
        <label className="flex flex-col gap-2">
          <span className="text-xs font-semibold uppercase tracking-wide text-slate-500 dark:text-slate-400">{label}</span>
          <select
            value={value}
            onChange={e => onChange(e.target.value)}
            className="rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm shadow-sm outline-none transition focus:border-medical-500 focus:ring-2 focus:ring-medical-100 dark:border-slate-800 dark:bg-slate-900 dark:focus:ring-slate-700"
          >
            {options.map(opt => <option key={opt} value={opt}>{opt}</option>)}
          </select>
        </label>
      );
    }

    function KPI({ title, value, subtitle, tone="blue", icon }) {
      const bgTone = {
        blue: "from-medical-500/10 to-medical-100/50 dark:from-medical-500/15 dark:to-slate-900",
        green: "from-green-500/10 to-green-100/50 dark:from-green-500/15 dark:to-slate-900",
        orange: "from-warning/10 to-amber-100/50 dark:from-warning/15 dark:to-slate-900",
        red: "from-risk/10 to-rose-100/50 dark:from-risk/15 dark:to-slate-900",
      }[tone] || "from-medical-500/10 to-medical-100/50";
      const iconTone = {
        blue: "text-medical-600 dark:text-medical-300",
        green: "text-green-600 dark:text-green-300",
        orange: "text-amber-600 dark:text-amber-300",
        red: "text-rose-600 dark:text-rose-300",
      }[tone] || "text-medical-600";
      const IconComp = Icon[icon];
      return (
        <div className={cn("rounded-3xl border border-white/60 bg-gradient-to-br p-5 shadow-soft dark:border-slate-800 dark:bg-slate-900", bgTone)}>
          <div className="mb-4 flex items-start justify-between gap-4">
            <div>
              <div className="text-xs font-semibold uppercase tracking-[0.16em] text-slate-500 dark:text-slate-400">{title}</div>
              <div className="mt-2 text-3xl font-bold tracking-tight">{value}</div>
            </div>
            <div className={cn("rounded-2xl bg-white/70 p-3 dark:bg-slate-800", iconTone)}>
              {IconComp ? <IconComp className="h-6 w-6" /> : null}
            </div>
          </div>
          <div className="text-sm text-slate-600 dark:text-slate-300">{subtitle}</div>
        </div>
      );
    }

    function SectionCard({ title, subtitle, right, children, className="" }) {
      return (
        <section className={cn("print-break rounded-3xl border border-slate-200 bg-white p-5 shadow-soft dark:border-slate-800 dark:bg-slate-900", className)}>
          <div className="mb-4 flex flex-wrap items-start justify-between gap-3">
            <div>
              <h2 className="text-lg font-bold tracking-tight">{title}</h2>
              {subtitle ? <p className="mt-1 text-sm text-slate-500 dark:text-slate-400">{subtitle}</p> : null}
            </div>
            {right}
          </div>
          {children}
        </section>
      );
    }

    function EmptyState() {
      return (
        <div className="flex h-64 items-center justify-center rounded-2xl border border-dashed border-slate-300 text-sm text-slate-500 dark:border-slate-700 dark:text-slate-400">
          Aucun enregistrement après filtrage
        </div>
      );
    }

    function HorizontalBars({ data, color=COLORS.blue, max=undefined, suffix="", percent=false }) {
      if (!data.length) return <EmptyState />;
      const maxVal = max ?? Math.max(...data.map(d => d.value), 1);
      return (
        <div className="space-y-3">
          {data.map(d => (
            <div key={d.label} className="space-y-1">
              <div className="flex items-center justify-between gap-3 text-sm">
                <div className="truncate font-medium">{d.label}</div>
                <div className="shrink-0 text-slate-500 dark:text-slate-400">
                  {percent ? formatPct(d.value) : `${formatNumber(d.value)}${suffix}`}
                </div>
              </div>
              <div className="h-2.5 rounded-full bg-slate-100 dark:bg-slate-800">
                <div
                  className="h-2.5 rounded-full"
                  style={{ width: `${(d.value / maxVal) * 100}%`, background: color }}
                />
              </div>
            </div>
          ))}
        </div>
      );
    }

    function VerticalBars({ data, color=COLORS.blue, height=230 }) {
      if (!data.length) return <EmptyState />;
      const max = Math.max(...data.map(d => d.value), 1);
      const w = 520, h = height, pad = { top: 14, right: 14, bottom: 52, left: 20 };
      const innerW = w - pad.left - pad.right;
      const innerH = h - pad.top - pad.bottom;
      const barW = innerW / data.length * 0.62;
      const gap = innerW / data.length * 0.38;
      return (
        <div className="overflow-x-auto">
          <svg viewBox={`0 0 ${w} ${h}`} className="min-w-[520px]">
            <line x1={pad.left} y1={h-pad.bottom} x2={w-pad.right} y2={h-pad.bottom} stroke="currentColor" opacity="0.15" />
            {data.map((d, i) => {
              const x = pad.left + i * (barW + gap) + gap/2;
              const bh = (d.value / max) * innerH;
              const y = pad.top + innerH - bh;
              return (
                <g key={d.label}>
                  <rect x={x} y={y} width={barW} height={bh} rx="10" fill={color} opacity="0.92" />
                  <text x={x + barW/2} y={y - 6} textAnchor="middle" fontSize="11" fill="currentColor" opacity="0.7">{formatNumber(d.value)}</text>
                  <text x={x + barW/2} y={h - 26} textAnchor="middle" fontSize="11" fill="currentColor" opacity="0.8">{d.label}</text>
                </g>
              );
            })}
          </svg>
        </div>
      );
    }

    function ScatterPlot({ data }) {
      const points = data.filter(d => Number.isFinite(d.x) && Number.isFinite(d.y));
      if (!points.length) return <EmptyState />;
      const w = 560, h = 280, pad = { top: 20, right: 18, bottom: 40, left: 44 };
      const xMin = Math.min(...points.map(p => p.x));
      const xMax = Math.max(...points.map(p => p.x));
      const yMin = 0;
      const yMax = Math.max(...points.map(p => p.y), 1);

      const scaleX = x => pad.left + ((x - xMin) / Math.max(1, (xMax - xMin))) * (w - pad.left - pad.right);
      const scaleY = y => h - pad.bottom - ((y - yMin) / Math.max(1, (yMax - yMin))) * (h - pad.top - pad.bottom);

      return (
        <div className="overflow-x-auto">
          <svg viewBox={`0 0 ${w} ${h}`} className="min-w-[560px]">
            <line x1={pad.left} y1={h-pad.bottom} x2={w-pad.right} y2={h-pad.bottom} stroke="currentColor" opacity="0.15"/>
            <line x1={pad.left} y1={pad.top} x2={pad.left} y2={h-pad.bottom} stroke="currentColor" opacity="0.15"/>
            {[0, 0.25, 0.5, 0.75, 1].map((t, i) => {
              const yv = yMin + t * (yMax - yMin);
              const y = scaleY(yv);
              return (
                <g key={i}>
                  <line x1={pad.left} y1={y} x2={w-pad.right} y2={y} stroke="currentColor" opacity="0.08"/>
                  <text x={pad.left - 8} y={y + 4} textAnchor="end" fontSize="11" fill="currentColor" opacity="0.7">{Math.round(yv)}</text>
                </g>
              );
            })}
            <text x={w/2} y={h-6} textAnchor="middle" fontSize="12" fill="currentColor" opacity="0.8">Âge calculé</text>
            <text x="14" y={h/2} textAnchor="middle" transform={`rotate(-90 14 ${h/2})`} fontSize="12" fill="currentColor" opacity="0.8">Nombre total de médicaments</text>
            {points.map((p, i) => (
              <circle key={i} cx={scaleX(p.x)} cy={scaleY(p.y)} r="4" fill={p.alert ? COLORS.red : p.interactions ? COLORS.orange : COLORS.blue} opacity="0.75">
                <title>{`${p.label} | Âge: ${p.x} | Médicaments: ${p.y}`}</title>
              </circle>
            ))}
          </svg>
        </div>
      );
    }

    function TooltipBadge({ text }) {
      return (
        <span className="group relative inline-flex cursor-help items-center rounded-full border border-slate-200 px-2 py-1 text-xs font-medium text-slate-600 dark:border-slate-700 dark:text-slate-300">
          Voir
          <span className="pointer-events-none absolute left-0 top-full z-20 mt-2 hidden w-80 rounded-2xl border border-slate-200 bg-white p-3 text-left text-xs leading-5 text-slate-700 shadow-2xl group-hover:block dark:border-slate-700 dark:bg-slate-950 dark:text-slate-200">
            {text || "Aucun antécédent détaillé renseigné"}
          </span>
        </span>
      );
    }

    function App() {
      const [dark, setDark] = useState(() => {
        const saved = localStorage.getItem("dashboard-theme");
        if (saved) return saved === "dark";
        return window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
      });

      const [trancheAge, setTrancheAge] = useState("Toutes");
      const [sexe, setSexe] = useState("Tous");
      const [centre, setCentre] = useState("Tous");
      const [interactionsOnly, setInteractionsOnly] = useState(false);
      const [search, setSearch] = useState("");
      const [page, setPage] = useState(1);
      const pageSize = 20;

      useEffect(() => {
        document.documentElement.classList.toggle("dark", dark);
        localStorage.setItem("dashboard-theme", dark ? "dark" : "light");
      }, [dark]);

      const centres = useMemo(() => ["Tous", ...Array.from(new Set(DATA.map(d => d.centre))).sort((a,b) => a.localeCompare(b, 'fr'))], []);
      const sexes = useMemo(() => ["Tous", ...Array.from(new Set(DATA.map(d => d.sexe))).sort((a,b) => a.localeCompare(b, 'fr'))], []);
      const ages = ["Toutes", "60-70", "70-80", "80+", "Non renseigné"];

      const filtered = useMemo(() => {
        const q = search.trim().toLowerCase();
        return DATA.filter(r => {
          if (trancheAge !== "Toutes" && r.trancheAge !== trancheAge) return false;
          if (sexe !== "Tous" && r.sexe !== sexe) return false;
          if (centre !== "Tous" && r.centre !== centre) return false;
          if (interactionsOnly && !r.interactions) return false;
          if (q) {
            const hay = [r.id, r.centre, r.region, r.province, r.protocole, r.antecedents].join(" ").toLowerCase();
            if (!hay.includes(q)) return false;
          }
          return true;
        });
      }, [trancheAge, sexe, centre, interactionsOnly, search]);

      useEffect(() => setPage(1), [trancheAge, sexe, centre, interactionsOnly, search]);

      const kpis = useMemo(() => {
        const meds = filtered.map(r => r.totalMedicaments).filter(v => Number.isFinite(v));
        const viralKnown = filtered.filter(r => r.chargeVirale && r.chargeVirale !== "Non renseigné");
        const ind = viralKnown.filter(r => r.indetectable).length;
        const interactions = filtered.filter(r => r.interactions).length;
        const alerts = filtered.filter(r => r.alertes.length).length;
        return {
          total: filtered.length,
          meanMeds: meds.length ? meds.reduce((a,b)=>a+b,0) / meds.length : null,
          viralControl: viralKnown.length ? (ind / viralKnown.length) * 100 : null,
          interactions,
          alerts,
        };
      }, [filtered]);

      const fragility = useMemo(() => groupCounts(filtered, r => r.etatFonctionnel).sort((a,b)=>b.value-a.value), [filtered]);

      const comorbidityBars = useMemo(() => {
        const items = [
          { label: "HTA", value: prevalence(filtered, "hta") },
          { label: "Diabète", value: prevalence(filtered, "diabete") },
          { label: "IRC", value: prevalence(filtered, "irc") },
          { label: "Troubles neurocognitifs", value: prevalence(filtered, "neuro") },
          { label: "Dépression / anxiété", value: prevalence(filtered, "depression") },
        ];
        return items.sort((a,b)=>b.value-a.value);
      }, [filtered]);

      const ageBars = useMemo(() => {
        const grouped = groupCounts(filtered, r => r.trancheAge);
        const map = new Map(grouped.map(x => [x.label, x.value]));
        return AGE_ORDER.filter(x => map.has(x)).map(label => ({ label, value: map.get(label) }));
      }, [filtered]);

      const scatter = useMemo(() => filtered
        .filter(r => Number.isFinite(r.age) && Number.isFinite(r.totalMedicaments))
        .map(r => ({
          x: r.age, y: r.totalMedicaments, label: r.id, interactions: r.interactions, alert: r.alertes.length > 0
        })), [filtered]);

      const regions = useMemo(() => topCounts(filtered, "region", 8), [filtered]);
      const provinces = useMemo(() => topCounts(filtered, "province", 8), [filtered]);
      const topCentres = useMemo(() => topCounts(filtered, "centre", 8), [filtered]);

      const rows = useMemo(() => [...filtered].sort((a,b) => (b.alertes.length - a.alertes.length) || ((b.age ?? -1) - (a.age ?? -1))), [filtered]);
      const totalPages = Math.max(1, Math.ceil(rows.length / pageSize));
      const paged = rows.slice((page-1)*pageSize, page*pageSize);

      function resetFilters() {
        setTrancheAge("Toutes");
        setSexe("Tous");
        setCentre("Tous");
        setInteractionsOnly(false);
        setSearch("");
      }

      function exportCSV() {
        const headers = [
          "Identifiant","Âge","Tranche d'âge","Sexe","Centre","Région","Province","Protocole ARV",
          "Charge virale","Nombre total médicaments","Interactions documentées","État fonctionnel",
          "HTA","Suivi HTA","Diabète","Suivi diabète","IRC","Suivi IRC","Dépression/Anxiété","Suivi Dépression/Anxiété",
          "Trouble neurocognitif","Suivi Trouble neurocognitif","Alertes","Antécédents médicaux"
        ];
        const csvRows = [headers.join(";")];
        rows.forEach(r => {
          const vals = [
            r.id, r.age ?? "", r.trancheAge, r.sexe, r.centre, r.region, r.province, r.protocole,
            r.chargeVirale, r.totalMedicaments ?? "", r.interactions ? "Oui" : "Non", r.etatFonctionnel,
            statusLabel(r.hta), statusLabel(r.suiviHta), statusLabel(r.diabete), statusLabel(r.suiviDiabete),
            statusLabel(r.irc), statusLabel(r.suiviIrc), statusLabel(r.depression), statusLabel(r.suiviDepression),
            statusLabel(r.neuro), statusLabel(r.suiviNeuro), r.alertes.join(", "), r.antecedents
          ].map(v => `"${String(v ?? "").replace(/"/g, '""')}"`);
          csvRows.push(vals.join(";"));
        });
        const blob = new Blob(["\ufeff" + csvRows.join("\n")], { type: "text/csv;charset=utf-8;" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "dashboard_geriatrie_vih_filtre.csv";
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      }

      return (
        <div className="min-h-screen grid-bg">
          <header className="border-b border-slate-200/70 bg-white/80 backdrop-blur-xl dark:border-slate-800 dark:bg-slate-950/80">
            <div className="mx-auto flex max-w-7xl items-center justify-between gap-4 px-4 py-5 md:px-6">
              <div>
                <div className="inline-flex items-center rounded-full border border-medical-200 bg-medical-50 px-3 py-1 text-xs font-semibold uppercase tracking-[0.18em] text-medical-700 dark:border-medical-900 dark:bg-medical-950/40 dark:text-medical-300">
                  Dashboard clinique partageable
                </div>
                <h1 className="mt-3 text-2xl font-black tracking-tight md:text-3xl">Gériatrie VIH — Vue analytique renforcée</h1>
                <p className="mt-2 max-w-3xl text-sm text-slate-600 dark:text-slate-300">
                  Version enrichie, filtrable et orientée décision. Les alertes mettent en évidence les incohérences de suivi lorsque le diagnostic est positif mais que le suivi est noté “Non”.
                </p>
              </div>

              <div className="no-print flex items-center gap-2">
                <button
                  onClick={() => setDark(v => !v)}
                  className="rounded-2xl border border-slate-200 bg-white p-3 text-slate-600 transition hover:border-medical-300 hover:text-medical-600 dark:border-slate-800 dark:bg-slate-900 dark:text-slate-300"
                  title="Basculer le mode sombre"
                >
                  {dark ? <Icon.Sun className="h-5 w-5" /> : <Icon.Moon className="h-5 w-5" />}
                </button>
                <button
                  onClick={() => window.print()}
                  className="inline-flex items-center gap-2 rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm font-semibold transition hover:border-medical-300 hover:text-medical-700 dark:border-slate-800 dark:bg-slate-900"
                >
                  <Icon.Printer className="h-4 w-4" /> Export PDF
                </button>
                <button
                  onClick={exportCSV}
                  className="inline-flex items-center gap-2 rounded-2xl bg-medical-600 px-4 py-3 text-sm font-semibold text-white transition hover:bg-medical-700"
                >
                  <Icon.Download className="h-4 w-4" /> Export CSV filtré
                </button>
              </div>
            </div>
          </header>

          <main className="mx-auto max-w-7xl space-y-6 px-4 py-6 md:px-6">
            <section className="no-print rounded-3xl border border-slate-200 bg-white p-5 shadow-soft dark:border-slate-800 dark:bg-slate-900">
              <div className="mb-4 flex flex-wrap items-start justify-between gap-3">
                <div>
                  <h2 className="text-lg font-bold tracking-tight">Filtres analytiques</h2>
                  <p className="mt-1 text-sm text-slate-500 dark:text-slate-400">
                    Âge, sexe, centre, interactions et recherche libre sur les dossiers.
                  </p>
                </div>
                <button
                  onClick={resetFilters}
                  className="inline-flex items-center gap-2 rounded-2xl border border-slate-200 px-4 py-2 text-sm font-semibold text-slate-600 hover:border-risk hover:text-risk dark:border-slate-800 dark:text-slate-300"
                >
                  <Icon.X className="h-4 w-4" /> Réinitialiser
                </button>
              </div>

              <div className="grid gap-4 md:grid-cols-2 xl:grid-cols-5">
                <SelectFilter label="Tranche d'âge" value={trancheAge} onChange={setTrancheAge} options={ages} />
                <SelectFilter label="Genre" value={sexe} onChange={setSexe} options={sexes} />
                <SelectFilter label="Centre de référence" value={centre} onChange={setCentre} options={centres} />
                <label className="flex flex-col gap-2">
                  <span className="text-xs font-semibold uppercase tracking-wide text-slate-500 dark:text-slate-400">Recherche dossier</span>
                  <div className="relative">
                    <Icon.Search className="pointer-events-none absolute left-3 top-1/2 h-4 w-4 -translate-y-1/2 text-slate-400" />
                    <input
                      value={search}
                      onChange={e => setSearch(e.target.value)}
                      placeholder="Identifiant, centre, région, protocole…"
                      className="w-full rounded-2xl border border-slate-200 bg-white py-3 pl-10 pr-4 text-sm shadow-sm outline-none transition focus:border-medical-500 focus:ring-2 focus:ring-medical-100 dark:border-slate-800 dark:bg-slate-900 dark:focus:ring-slate-700"
                    />
                  </div>
                </label>
                <label className="flex items-end">
                  <button
                    onClick={() => setInteractionsOnly(v => !v)}
                    className={cn(
                      "flex w-full items-center justify-between rounded-2xl border px-4 py-3 text-left shadow-sm transition",
                      interactionsOnly
                        ? "border-warning bg-amber-50 text-amber-800 dark:border-amber-700 dark:bg-amber-950/30 dark:text-amber-300"
                        : "border-slate-200 bg-white text-slate-700 dark:border-slate-800 dark:bg-slate-900 dark:text-slate-300"
                    )}
                  >
                    <div>
                      <div className="text-xs font-semibold uppercase tracking-wide">Interactions médicamenteuses</div>
                      <div className="mt-1 text-sm">Isoler uniquement les cas documentés</div>
                    </div>
                    <div className={cn("h-6 w-11 rounded-full p-1 transition", interactionsOnly ? "bg-warning" : "bg-slate-300 dark:bg-slate-700")}>
                      <div className={cn("h-4 w-4 rounded-full bg-white transition", interactionsOnly ? "translate-x-5" : "translate-x-0")} />
                    </div>
                  </button>
                </label>
              </div>
            </section>

            <section className="grid gap-4 md:grid-cols-2 xl:grid-cols-5">
              <KPI title="Patients inclus" value={formatNumber(kpis.total)} subtitle="Nombre total après filtrage" tone="blue" icon="Users" />
              <KPI title="Sévérité du fardeau" value={formatNumber(kpis.meanMeds, 1)} subtitle="Moyenne du nombre total de médicaments quotidiens" tone="orange" icon="Pill" />
              <KPI title="Contrôle viral" value={formatPct(kpis.viralControl)} subtitle="% avec charge virale indétectable" tone="green" icon="Shield" />
              <KPI title="Risque médicamenteux" value={formatNumber(kpis.interactions)} subtitle="Cas avec interactions médicamenteuses documentées" tone="red" icon="Alert" />
              <KPI title="Alertes de suivi" value={formatNumber(kpis.alerts)} subtitle="Diagnostic positif mais suivi marqué “Non”" tone="red" icon="Alert" />
            </section>

            <section className="grid gap-6 xl:grid-cols-12">
              <SectionCard title="Fragilité — état fonctionnel" subtitle="Répartition des patients selon l'état fonctionnel enregistré" className="xl:col-span-4">
                <HorizontalBars data={fragility} color={COLORS.teal} />
              </SectionCard>

              <SectionCard title="Profil des comorbidités" subtitle="Prévalence calculée sur les dossiers avec information disponible" className="xl:col-span-4">
                <HorizontalBars data={comorbidityBars} color={COLORS.red} percent />
              </SectionCard>

              <SectionCard title="Distribution par tranche d'âge" subtitle="Volume de dossiers par groupe d'âge" className="xl:col-span-4">
                <VerticalBars data={ageBars} color={COLORS.blue} />
              </SectionCard>
            </section>

            <section className="grid gap-6 xl:grid-cols-12">
              <SectionCard
                title="Analyse de la polymédication"
                subtitle="Corrélation entre l'âge calculé et le nombre total de médicaments. Orange : interactions documentées. Rouge : dossier avec alerte."
                className="xl:col-span-7"
              >
                <ScatterPlot data={scatter} />
              </SectionCard>

              <SectionCard title="Top centres représentés" subtitle="Centres de référence les plus présents dans la sélection" className="xl:col-span-5">
                <HorizontalBars data={topCentres} color={COLORS.violet} />
              </SectionCard>
            </section>

            <section className="grid gap-6 xl:grid-cols-12">
              <SectionCard title="Répartition géographique — régions" subtitle="Top des régions représentées" className="xl:col-span-6">
                <HorizontalBars data={regions} color={COLORS.blue} />
              </SectionCard>
              <SectionCard title="Répartition géographique — provinces" subtitle="Top des provinces représentées" className="xl:col-span-6">
                <HorizontalBars data={provinces} color={COLORS.green} />
              </SectionCard>
            </section>

            <SectionCard
              title="Tableau clinique détaillé"
              subtitle="Liste exploitable des dossiers. Les lignes rouges signalent des incohérences de suivi. Le bouton “Voir” affiche les antécédents médicaux."
              right={
                <div className="text-sm text-slate-500 dark:text-slate-400">
                  {rows.length} dossiers · page {page} / {totalPages}
                </div>
              }
            >
              <div className="overflow-auto rounded-2xl border border-slate-200 dark:border-slate-800">
                <table className="min-w-full divide-y divide-slate-200 text-sm dark:divide-slate-800">
                  <thead className="bg-slate-50 dark:bg-slate-950">
                    <tr className="text-left text-xs font-semibold uppercase tracking-wide text-slate-500 dark:text-slate-400">
                      <th className="px-4 py-3">Identifiant</th>
                      <th className="px-4 py-3">Âge</th>
                      <th className="px-4 py-3">Sexe</th>
                      <th className="px-4 py-3">Centre</th>
                      <th className="px-4 py-3">Protocole ARV</th>
                      <th className="px-4 py-3">HTA</th>
                      <th className="px-4 py-3">Diabète</th>
                      <th className="px-4 py-3">IRC</th>
                      <th className="px-4 py-3">Neuro</th>
                      <th className="px-4 py-3">État fonctionnel</th>
                      <th className="px-4 py-3">Alertes</th>
                      <th className="px-4 py-3">Antécédents</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-100 dark:divide-slate-800">
                    {paged.map((r, idx) => (
                      <tr key={r.id + idx} className={cn(
                        "align-top transition hover:bg-slate-50/70 dark:hover:bg-slate-800/40",
                        r.alertes.length ? "bg-rose-50/70 dark:bg-rose-950/15" : ""
                      )}>
                        <td className="px-4 py-3 font-semibold">{r.id}</td>
                        <td className="px-4 py-3">{formatNumber(r.age)}</td>
                        <td className="px-4 py-3">{r.sexe}</td>
                        <td className="max-w-[220px] px-4 py-3">{r.centre}</td>
                        <td className="max-w-[180px] px-4 py-3">{r.protocole}</td>
                        <td className="px-4 py-3">{statusLabel(r.hta)} / <span className="text-slate-500">S: {statusLabel(r.suiviHta)}</span></td>
                        <td className="px-4 py-3">{statusLabel(r.diabete)} / <span className="text-slate-500">S: {statusLabel(r.suiviDiabete)}</span></td>
                        <td className="px-4 py-3">{statusLabel(r.irc)} / <span className="text-slate-500">S: {statusLabel(r.suiviIrc)}</span></td>
                        <td className="px-4 py-3">{statusLabel(r.neuro)} / <span className="text-slate-500">S: {statusLabel(r.suiviNeuro)}</span></td>
                        <td className="px-4 py-3">{r.etatFonctionnel}</td>
                        <td className="px-4 py-3">
                          {r.alertes.length ? (
                            <div className="space-y-1">
                              {r.alertes.map(a => (
                                <div key={a} className="rounded-full bg-rose-100 px-2 py-1 text-xs font-semibold text-rose-700 dark:bg-rose-950/40 dark:text-rose-300">{a}</div>
                              ))}
                            </div>
                          ) : <span className="text-slate-400">Aucune</span>}
                        </td>
                        <td className="px-4 py-3"><TooltipBadge text={r.antecedents} /></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>

              <div className="no-print mt-4 flex flex-wrap items-center justify-between gap-3">
                <div className="text-sm text-slate-500 dark:text-slate-400">
                  Affichage de {paged.length ? ((page-1)*pageSize + 1) : 0} à {Math.min(page*pageSize, rows.length)} sur {rows.length} dossiers
                </div>
                <div className="flex items-center gap-2">
                  <button
                    onClick={() => setPage(p => Math.max(1, p-1))}
                    disabled={page === 1}
                    className="rounded-2xl border border-slate-200 px-4 py-2 text-sm font-semibold disabled:cursor-not-allowed disabled:opacity-40 dark:border-slate-800"
                  >
                    Précédent
                  </button>
                  <button
                    onClick={() => setPage(p => Math.min(totalPages, p+1))}
                    disabled={page === totalPages}
                    className="rounded-2xl border border-slate-200 px-4 py-2 text-sm font-semibold disabled:cursor-not-allowed disabled:opacity-40 dark:border-slate-800"
                  >
                    Suivant
                  </button>
                </div>
              </div>
            </SectionCard>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
